<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #232526, #414345);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    color: white;
    padding: 20px;
}

.card {
    background: rgba(0,0,0,0.5);
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    width: 350px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border: none;
    border-radius: 5px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    background: #ff7e5f;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #feb47b;
}

a {
    color: #ff7e5f;
    text-decoration: none;
}

.error {
    color: #ff6b6b;
    font-size: 14px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">
<h2>Register</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <input name="name" placeholder="Full Name">
    <input name="branch" placeholder="Branch (e.g. CSE)">
    <input name="section" placeholder="Section (e.g. A)">
    
    <button>Register</button>
</form>

<p>Already have an account? <a href="/login">Login</a></p>

</div>

</body>
</html>
