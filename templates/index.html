<!DOCTYPE html>
<html>
<head>
<title>Event Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    margin: 0;
    color: white;
}

.container {
    width: 90%;
    margin: auto;
}

h1 {
    text-align: center;
    padding: 20px;
}

form {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

input {
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    background: #ff7e5f;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #feb47b;
    transform: scale(1.05);
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.delete-btn {
    background: red;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="top-bar">
    <h2>Welcome {{user}}</h2>
    <a href="/logout"><button>Logout</button></a>
</div>

<h1>🎉 Event Planner</h1>

<!-- Add Event -->
<form method="POST" action="/add">
<input name="name" placeholder="Event Name" required>
<input name="date" type="date" required>
<input name="time" type="time" required>
<input name="location" placeholder="Location" required>
<input name="image" placeholder="Image URL" required>
<button>Add Event</button>
</form>

<!-- Search -->
<form method="POST" action="/search">
<input name="query" placeholder="Search Event">
<button>Search</button>
</form>

<div class="cards">

{% for e in events %}
<div class="card">
<img src="{{e.image}}">
<h3>{{e.name}}</h3>
<p>{{e.date}} | {{e.time}}</p>
<p>{{e.location}}</p>

<a href="/like/{{e.id}}">
<button>❤️ Like ({{e.likes}})</button>
</a>

<a href="/delete/{{e.id}}">
<button class="delete-btn">Delete</button>
</a>

</div>
{% endfor %}

</div>

</div>

</body>
</html>
